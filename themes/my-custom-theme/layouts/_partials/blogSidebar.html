<div class = "blogSideBar">
  <h4>Tags</h4>
  <ul>
    {{ range $name, $taxonomy := .tags }}
      <li>
        <a href="{{ "/tags/" | relLangURL }}{{ $name | urlize }}">
          {{ $name | humanize }}
        </a>
      </li>
    {{ end }}
  </ul>
